<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>To-Do</h1>
   <!-- КНОПКИ СПИСКОВ — отдельно -->
  <div class="list-buttons">
    <button onclick="switchList('daily')">DAILY</button>
    <button onclick="switchList('important')">IMPORTANT</button>
    <button onclick="switchList('to buy')">TO BUY</button>
    <button onclick="switchList('archive')">ARCHIVE</button>
  </div>
  <!-- ЭТО ПРАВИЛЬНАЯ ГРУППА: инпут + кнопка ADD -->
  <div class="input-group">
    <input type="text" id="taskInput" placeholder="add task...">
    <button id="addBtn">ADD</button>
  </div>
  <ul id="taskList"></ul>
  <div class="controlArchive">
     <button id="cleanArchive">dlt_tsks</button>
  </div>
  <script src="script.js"></script>
  <div class="glass-circle circle-1"></div>
<div class="glass-circle circle-2"></div>
<div class="glass-circle circle-3"></div>
<div class="glass-circle circle-4"></div>
</body>
</html>
